<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Япон Хэлний Үг Цээжлэх Апп (JLPT N2 - 153 Үг)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome дүрснүүд -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Картыг 3D хэмжээстэй эргүүлэх (Flip) хөдөлгөөний CSS тохиргоо */
        .card-container {
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-inner.flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1rem;
        }
        .card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-[#121212] text-white font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Үндсэн Аппликейшн Контейнер -->
    <div class="w-full max-w-2xl bg-[#1e1e1e] rounded-2xl p-6 shadow-2xl border border-[#2d2d2d]">
        
        <!-- Дээд хэсгийн Табууд (Navigation Tabs) -->
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button id="tab-flashcard" onclick="switchTab('flashcard')" class="py-2.5 px-4 rounded-xl text-lg font-medium border border-[#333333] bg-[#222222] hover:bg-[#2a2a2a] transition duration-200 text-white relative">
                Flashcard
                <div id="active-indicator" class="absolute bottom-1 left-4 right-4 h-0.5 bg-blue-500 rounded-full"></div>
            </button>
            <button id="tab-quiz" onclick="switchTab('quiz')" class="py-2.5 px-4 rounded-xl text-lg font-medium border border-[#333333] bg-[#1a1a1a] text-gray-400 hover:bg-[#222222] hover:text-white transition duration-200">
                Quiz
            </button>
            <button id="tab-progress" onclick="switchTab('progress')" class="py-2.5 px-4 rounded-xl text-lg font-medium border border-[#333333] bg-[#1a1a1a] text-gray-400 hover:bg-[#222222] hover:text-white transition duration-200">
                Явц
            </button>
        </div>

        <!-- ================= FLASHCARD ХЭСЭГ ================= -->
        <div id="section-flashcard" class="space-y-6">
            
            <!-- Үг хайх болон шүүх хэсэг -->
            <div class="flex flex-col sm:flex-row gap-2">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="search-input" oninput="filterWords()" placeholder="Үг хайх (Ханз, дуудлага, орчуулга...)" class="w-full pl-9 pr-4 py-2 bg-[#262626] border border-[#383838] rounded-xl text-sm focus:outline-none focus:border-blue-500 text-white">
                </div>
                <select id="category-filter" onchange="filterWords()" class="bg-[#262626] border border-[#383838] rounded-xl px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-blue-500">
                    <option value="all">Бүх ангилал</option>
                    <option value="үйл үг">Үйл үг</option>
                    <option value="нэр үг">Нэр үг</option>
                    <option value="тэмдэг нэр">Тэмдэг нэр</option>
                    <option value="дайвар үг">Дайвар үг</option>
                    <option value="бусад">Бусад</option>
                </select>
            </div>

            <!-- Үгийн дугаар харуулах явц -->
            <div class="flex justify-between items-center text-xs text-gray-400">
                <span id="word-counter">Үг: 1 / 153</span>
                <span class="bg-[#2a2a2a] px-2 py-1 rounded-md text-blue-400 font-mono" id="current-word-status">Суралцаж буй</span>
            </div>

            <!-- Эргэдэг Карт -->
            <div class="card-container h-80 w-full">
                <div id="flashcard" class="card-inner" onclick="flipCard()">
                    <!-- Картын нүүр тал (Япон үг) -->
                    <div class="card-front bg-[#262626] border border-[#333333] p-6 text-center select-none">
                        <span id="word-tag" class="bg-blue-950/80 text-blue-400 text-sm font-semibold px-3 py-1 rounded-full mb-6 border border-blue-800 border-opacity-40">JLPT N2</span>
                        <h1 id="word-kanji" class="text-4xl md:text-5xl font-bold tracking-wide mb-3">遭う</h1>
                        <p id="word-kana" class="text-xl text-gray-400 mb-8">あう</p>
                        <p class="text-gray-500 text-sm flex items-center gap-1">
                            <i class="fa-solid fa-arrow-left-right"></i> дарж утгыг харах
                        </p>
                    </div>
                    <!-- Картын ар тал (Монгол орчуулга) -->
                    <div class="card-back bg-[#1d2d24] border border-green-800 p-6 text-center select-none">
                        <span class="text-green-400 text-sm font-semibold uppercase tracking-wider mb-6">Орчуулга</span>
                        <h2 id="word-translation" class="text-2xl font-bold mb-4 text-green-200">таарах, өртөх (осол гамшигт)</h2>
                        <p id="word-example" class="text-gray-300 text-base italic max-w-md">事故に遭う (Осолд өртөх)</p>
                        <p class="text-green-500 text-sm mt-8">Буцааж эргүүлэх бол дарна уу</p>
                    </div>
                </div>
            </div>

            <!-- Удирдах товчлуурууд - Эгнээ 1 -->
            <div class="grid grid-cols-3 gap-3">
                <button onclick="prevWord()" class="py-3 px-4 rounded-xl border border-[#383838] bg-[#222222] hover:bg-[#2c2c2c] transition font-medium flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> Өмнөх
                </button>
                <button onclick="shuffleWords()" class="py-3 px-4 rounded-xl border border-[#383838] bg-[#222222] hover:bg-[#2c2c2c] transition font-medium flex items-center justify-center gap-2">
                    <i class="fa-solid fa-shuffle text-blue-400"></i> Холих
                </button>
                <button onclick="nextWord()" class="py-3 px-4 rounded-xl border border-[#383838] bg-[#222222] hover:bg-[#2c2c2c] transition font-medium flex items-center justify-center gap-2">
                    Дараах <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <!-- Үнэлгээний товчлуурууд - Эгнээ 2 -->
            <div class="grid grid-cols-3 gap-3">
                <button onclick="markAsUnknown()" class="py-3 px-4 rounded-xl border border-red-900/50 bg-[#2d1c1c] hover:bg-[#3d2424] text-red-300 transition font-medium flex items-center justify-center gap-2">
                    <i class="fa-solid fa-xmark"></i> Мэдэхгүй
                </button>
                <button onclick="skipWord()" class="py-3 px-4 rounded-xl border border-[#383838] bg-[#222222] hover:bg-[#2c2c2c] text-gray-400 transition font-medium">
                    Алгасах
                </button>
                <button onclick="markAsKnown()" class="py-3 px-4 rounded-xl border border-green-900/50 bg-[#1c2d20] hover:bg-[#243d2a] text-green-300 transition font-medium flex items-center justify-center gap-2">
                    <i class="fa-solid fa-check"></i> Мэднэ
                </button>
            </div>
        </div>

        <!-- ================= QUIZ ХЭСЭГ ================= -->
        <div id="section-quiz" class="space-y-6 hidden">
            <div class="bg-[#222222] p-6 rounded-xl border border-[#333333] text-center">
                <p class="text-gray-400 text-sm mb-2" id="quiz-progress">Асуулт 1 / 5</p>
                <h1 id="quiz-question" class="text-4xl font-bold mb-2">確認する</h1>
                <p id="quiz-reading" class="text-lg text-gray-400">かくにんする</p>
            </div>

            <div class="grid grid-cols-1 gap-3" id="quiz-options">
                <!-- Сонголтууд энд автоматаар үүснэ -->
            </div>

            <div class="flex justify-between items-center pt-2">
                <p class="text-gray-400" id="quiz-score">Оноо: 0</p>
                <button onclick="resetQuiz()" class="py-2 px-4 rounded-lg bg-blue-600 hover:bg-blue-700 transition text-sm font-medium">
                    Шинээр эхлэх
                </button>
            </div>
        </div>

        <!-- ================= ЯВЦ ХЭСЭГ ================= -->
        <div id="section-progress" class="space-y-6 hidden">
            <h3 class="text-xl font-bold border-b border-[#333333] pb-3">Миний суралцсан явц</h3>
            
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-[#222222] p-4 rounded-xl border border-[#333333] text-center">
                    <p class="text-2xl font-bold text-blue-400" id="stats-total">0</p>
                    <p class="text-xs text-gray-400 mt-1">Нийт үгс</p>
                </div>
                <div class="bg-[#1c2d20] p-4 rounded-xl border border-green-900/40 text-center">
                    <p class="text-2xl font-bold text-green-400" id="stats-known">0</p>
                    <p class="text-xs text-green-300 mt-1">Мэддэг</p>
                </div>
                <div class="bg-[#2d1c1c] p-4 rounded-xl border border-red-900/40 text-center">
                    <p class="text-2xl font-bold text-red-400" id="stats-unknown">0</p>
                    <p class="text-xs text-red-300 mt-1">Мэдэхгүй</p>
                </div>
            </div>

            <!-- Сургалтын явцын хувь -->
            <div class="space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-400">Цээжлэлтийн хувь</span>
                    <span class="font-bold text-green-400" id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-[#333333] rounded-full h-3 overflow-hidden">
                    <div id="progress-bar-fill" class="bg-green-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="flex justify-end">
                <button onclick="clearProgress()" class="text-sm text-red-400 hover:text-red-300 flex items-center gap-1 transition">
                    <i class="fa-solid fa-trash"></i> Бүх явцыг устгах
                </button>
            </div>
        </div>

    </div>

    <!-- Тоглоомын логик ба Үгсийн сан -->
    <script>
        // =========================================================
        // 🌟 JLPT N2 БҮХ 153 ҮГСИЙН САН (Орчуулгатай) 🌟
        // =========================================================
        const defaultWords = [
            { kanji: "遭う", kana: "あう", translation: "таарах, өртөх (осол гамшигт)", tag: "үйл үг", example: "事故に遭う (Осолд өртөх)" },
            { kanji: "扇ぐ", kana: "あおぐ", translation: "сэвэх, сэнсдэх", tag: "үйл үг", example: "扇子で扇ぐ (Сэнсээр сэвэх)" },
            { kanji: "青白い", kana: "あおじろい", translation: "цонхигор, цاحвар цагаан", tag: "тэмдэг нэр", example: "青白い顔 (Цонхигор царай)" },
            { kanji: "明き", kana: "あき", translation: "сул зай, чөлөөт цаг, хоосон чанар", tag: "нэр үг", example: "部屋の明き (Өрөөний сул зай)" },
            { kanji: "飽くまで", kana: "あくまで", translation: "эцсийг нь хүртэл, тууштай", tag: "дайвар үг", example: "あくまで追求する (Эцсийг нь хүртэл хөөцөлдөх)" },
            { kanji: "明け方", kana: "あけがた", translation: "үүрийн гэгээ, үүр цайх үе", tag: "нэр үг", example: "明け方に目が覚める (Үүрээр сэрэх)" },
            { kanji: "揚げる", kana: "あげる", translation: "тосонд шарах, хайрах", tag: "үйл үг", example: "魚を揚げる (Загас тосонд шарах)" },
            { kanji: "挙げる", kana: "あげる", translation: "дээш өргөх, жишээ татах", tag: "үйл үг", example: "手を挙げる (Гараа өргөх)" },
            { kanji: "憧れる", kana: "あこがれる", translation: "мөрөөдөх, бишрэх, тэмүүлэх", tag: "үйл үг", example: "都会に憧れる (Хотын амьдралыг мөрөөдөх)" },
            { kanji: "足跡", kana: "あしあと", translation: "хөлийн мөр", tag: "нэр үг", example: "雪の上の足跡 (Цасан дээрх хөлийн мөр)" },
            { kanji: "味わう", kana: "あじわう", translation: "амтлах, мэдрэх, таашаах", tag: "үйл үг", example: "料理を味わう (Хоолыг амтлах)" },
            { kanji: "預かる", kana: "あずかる", translation: "хадгалах, түр харах, хариуцах", tag: "үйл үг", example: "荷物を預かる (Ачаа хадгалах)" },
            { kanji: "暖まる", kana: "あたたまる", translation: "дулаацах, дулаан болох", tag: "үйл үг", example: "部屋が暖まる (Өрөө дулаацах)" },
            { kanji: "暖める", kana: "あたためる", translation: "дулаацуулах, халаах", tag: "үйл үг", example: "スープを暖める (Шөлийг халаах)" },
            { kanji: "厚かましい", kana: "あつかましい", translation: "ичгүүргүй, улаан хацартай", tag: "тэмдэг нэр", example: "厚かましい人 (Ичгүүргүй хүн)" },
            { kanji: "圧縮", kana: "あっしゅく", translation: "шахалт, нягтаршил", tag: "нэр үг", example: "データの圧縮 (Мэдээллийн шахалт)" },
            { kanji: "宛名", kana: "あてな", translation: "хүлээн авагчийн хаяг, нэр", tag: "нэр үг", example: "手紙の宛名 (Захидлын хаяг)" },
            { kanji: "暴れる", kana: "あばれる", translation: "догшин авирлах, тийчлэх", tag: "үйл үг", example: "酔っ払いが暴れる (Согтуу хүн догшин авирлах)" },
            { kanji: "脂", kana: "あぶら", translation: "өөх тос, малын тос", tag: "нэр үг", example: "肉の脂 (Махны өөх)" },
            { kanji: "雨戸", kana: "あまど", translation: "хамгаалалтын хаалт (шуурганаас хамгаалах)", tag: "нэр үг", example: "雨戸を閉める (Хамгаалалтын хаалт хаах)" },
            { kanji: "甘やかす", kana: "あまやかす", translation: "эрхлүүлэх, толгой дээрээ гаргах", tag: "үйл үг", example: "子供を甘やかす (Хүүхдийг эрхлүүлэх)" },

            { kanji: "争う", kana: "あらそう", translation: "маргалдах, өрсөлдөх", tag: "үйл үг", example: "勝敗を争う (Ялалтын төлөө өрсөлдөх)" },
            { kanji: "改めて", kana: "あらためて", translation: "дахиж, шинээр, дараа өөр цагт", tag: "дайвар үг", example: "改めて説明する (Дахин тайлбарлах)" },
            { kanji: "改める", kana: "あらためる", translation: "засах, сайжруулах, шинэчлэх", tag: "үйл үг", example: "規則を改める (Дүрмийг шинэчлэх)" },
            { kanji: "著す", kana: "あらわす", translation: "зохиох, бичих, хэвлүүлэх", tag: "үйл үг", example: "本を著す (Ном хэвлүүлэх)" },
            { kanji: "有難い", kana: "ありがたい", translation: "талархууштай, ач тустай", tag: "тэмдэг нэр", example: "有難いお言葉 (Талархууштай үг)" },
            { kanji: "在る", kana: "ある", translation: "байх, орших", tag: "үйл үг", example: "真実は一つに在る (Үнэн ганц л байдаг)" },
            { kanji: "安易", kana: "あんい", translation: "амархан, хөнгөмсөг, хялбарчлах", tag: "тэмдэг нэр", example: "安易な選択 (Хялбар сонголт)" },
            { kanji: "案外", kana: "あんがい", translation: "бодсоноос өөрөөр, санаснаас хялбар", tag: "тэмдэг нэр", example: "案外難しい (Бодсоноос хэцүү)" },
            { kanji: "言い出す", kana: "いいだす", translation: "хэлж эхлэх, санал болгох", tag: "үйл үг", example: "本音を言い出す (Үнэнээ хэлж эхлэх)" },
            { kanji: "言い付ける", kana: "いいつける", translation: "тушаах, зааварлах, ховлох", tag: "үйл үг", example: "用事を言い付ける (Ажил даалгах)" },
            { kanji: "意義", kana: "いぎ", translation: "утга учир, ач холбогдол", tag: "нэр үг", example: "意義のある生活 (Утга учиртай амьдрал)" },
            { kanji: "生き生き", kana: "いきいき", translation: "цовоо сэргэлэн, эрч хүчтэй", tag: "дайвар үг", example: "生き生きと話す (Эрч хүчтэй ярих)" },
            { kanji: "育児", kana: "いくじ", translation: "хүүхэд өсгөх, хүмүүжүүлэх", tag: "нэр үг", example: "育児に励む (Хүүхдээ өсгөхөөр хичээх)" },
            { kanji: "幾分", kana: "いくぶん", translation: "бага зэрэг, хэсэг хэмжээгээр", tag: "дайвар үг", example: "幾分良くなった (Бага зэрэг дээрдсэн)" },
            { kanji: "生け花", kana: "いけばな", translation: "Икэбана (цэцэг чимэглэх урлаг)", tag: "нэр үг", example: "生け花を習う (Икэбана сурах)" },
            { kanji: "以後", kana: "いご", translation: "үүнээс хойш, дараа нь", tag: "нэр үг", example: "以後、注意します (Үүнээс хойш анхааръя)" },
            { kanji: "以降", kana: "いこう", translation: "тухайн цаг мөчөөс эхлэн, хойш", tag: "нэр үг", example: "来週以降に (Дараагийн долоо хоногоос хойш)" },
            { kanji: "勇ましい", kana: "いさましい", translation: "эр зоригтой, баатарлаг", tag: "тэмдэг нэр", example: "勇ましい姿 (Эрэлхэг дүр төрх)" },
            { kanji: "衣食住", kana: "いしょくじゅう", translation: "амьдралын наад захын хэрэгцээ (хоол, хувцас, орон байр)", tag: "нэр үг", example: "衣食住の確保 (Амьдралын суурь хэрэгцээг хангах)" },

        let words = [...defaultWords];
        let currentIndex = 0;

        // Хэрэглэгчийн суралцсан төлөв (LocalStorage-оос унших)
        let knownWords = JSON.parse(localStorage.getItem('knownWords')) || [];
        let unknownWords = JSON.parse(localStorage.getItem('unknownWords')) || [];

        // Апп ачаалагдахад ажиллах
        window.onload = function() {
            updateFlashcard();
            updateStats();
        };

        // Таб солих функц
        function switchTab(tabName) {
            document.getElementById('section-flashcard').classList.add('hidden');
            document.getElementById('section-quiz').classList.add('hidden');
            document.getElementById('section-progress').classList.add('hidden');

            const tabs = ['flashcard', 'quiz', 'progress'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.classList.remove('bg-[#222222]', 'text-white');
                btn.classList.add('bg-[#1a1a1a]', 'text-gray-400');
            });

            document.getElementById(`section-${tabName}`).classList.remove('hidden');
            const activeBtn = document.getElementById(`tab-${tabName}`);
            activeBtn.classList.remove('bg-[#1a1a1a]', 'text-gray-400');
            activeBtn.classList.add('bg-[#222222]', 'text-white');

            const indicator = document.getElementById('active-indicator');
            if (indicator) indicator.remove();

            activeBtn.insertAdjacentHTML('beforeend', `<div id="active-indicator" class="absolute bottom-1 left-4 right-4 h-0.5 bg-blue-500 rounded-full"></div>`);

            if (tabName === 'quiz') {
                resetQuiz();
            } else if (tabName === 'progress') {
                updateStats();
            }
        }

        // Карт эргүүлэх
        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function resetCardFlip() {
            document.getElementById('flashcard').classList.remove('flipped');
        }

        // Картын мэдээллийг шинэчлэх
        function updateFlashcard() {
            if (words.length === 0) {
                document.getElementById('word-kanji').innerText = "Үг олдсонгүй";
                document.getElementById('word-kana').innerText = "";
                document.getElementById('word-translation').innerText = "Хайлтын үр дүн хоосон байна.";
                document.getElementById('word-tag').innerText = "-";
                document.getElementById('word-example').innerText = "";
                document.getElementById('word-counter').innerText = "Үг: 0 / 0";
                return;
            }

            const current = words[currentIndex];
            document.getElementById('word-kanji').innerText = current.kanji;
            document.getElementById('word-kana').innerText = current.kana;
            document.getElementById('word-translation').innerText = current.translation;
            document.getElementById('word-tag').innerText = current.tag;
            document.getElementById('word-example').innerText = current.example || "Жишээ байхгүй байна.";
            
            // Дугаар шинэчлэх
            document.getElementById('word-counter').innerText = `Үг: ${currentIndex + 1} / ${words.length}`;
            
            // Үгийн одоогийн статусыг харуулах (Мэднэ / Мэдэхгүй)
            const statusLabel = document.getElementById('current-word-status');
            if (knownWords.includes(current.kanji)) {
                statusLabel.innerText = "Мэднэ";
                statusLabel.className = "bg-green-950/80 px-2 py-1 rounded-md text-green-400 font-bold border border-green-800";
            } else if (unknownWords.includes(current.kanji)) {
                statusLabel.innerText = "Мэдэхгүй";
                statusLabel.className = "bg-red-950/80 px-2 py-1 rounded-md text-red-400 font-bold border border-red-800";
            } else {
                statusLabel.innerText = "Суралцаж буй";
                statusLabel.className = "bg-[#2a2a2a] px-2 py-1 rounded-md text-blue-400 font-medium";
            }

            resetCardFlip();
        }

        // Дараах үг
        function nextWord() {
            if (words.length === 0) return;
            currentIndex = (currentIndex + 1) % words.length;
            updateFlashcard();
        }

        // Өмнөх үг
        function prevWord() {
            if (words.length === 0) return;
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateFlashcard();
        }

        // Үгсийг холих
        function shuffleWords() {
            if (words.length === 0) return;
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
            currentIndex = 0;
            updateFlashcard();
            const card = document.getElementById('flashcard');
            card.style.transform = 'scale(0.95)';
            setTimeout(() => { card.style.transform = ''; }, 200);
        }

        // Шүүлтүүр болон Хайлт хийх функц
        function filterWords() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const selectedCategory = document.getElementById('category-filter').value;

            words = defaultWords.filter(w => {
                const matchesSearch = w.kanji.toLowerCase().includes(searchQuery) || 
                                      w.kana.toLowerCase().includes(searchQuery) || 
                                      w.translation.toLowerCase().includes(searchQuery);
                
                const matchesCategory = selectedCategory === 'all' || w.tag === selectedCategory;

                return matchesSearch && matchesCategory;
            });

            currentIndex = 0;
            updateFlashcard();
        }

        // Мэднэ гэж тэмдэглэх
        function markAsKnown() {
            if (words.length === 0) return;
            const current = words[currentIndex];
            if (!knownWords.includes(current.kanji)) {
                knownWords.push(current.kanji);
                unknownWords = unknownWords.filter(w => w !== current.kanji);
                saveState();
            }
            nextWord();
        }

        // Мэдэхгүй гэж тэмдэглэх
        function markAsUnknown() {
            if (words.length === 0) return;
            const current = words[currentIndex];
            if (!unknownWords.includes(current.kanji)) {
                unknownWords.push(current.kanji);
                knownWords = knownWords.filter(w => w !== current.kanji);
                saveState();
            }
            nextWord();
        }

        // Алгасах
        function skipWord() {
            nextWord();
        }

        function saveState() {
            localStorage.setItem('knownWords', JSON.stringify(knownWords));
            localStorage.setItem('unknownWords', JSON.stringify(unknownWords));
            updateStats();
        }

        function updateStats() {
            const total = defaultWords.length;
            const knownCount = knownWords.length;
            const unknownCount = unknownWords.length;

            document.getElementById('stats-total').innerText = total;
            document.getElementById('stats-known').innerText = knownCount;
            document.getElementById('stats-unknown').innerText = unknownCount;

            const percent = total > 0 ? Math.round((knownCount / total) * 100) : 0;
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-bar-fill').style.width = `${percent}%`;
        }

        function clearProgress() {
            if (confirm("Та явцаа үнэхээр устгах уу?")) {
                knownWords = [];
                unknownWords = [];
                saveState();
                filterWords(); // Өөрчлөлтийг шууд харуулах
            }
        }

        // ================= QUIZ ЛОГИК =================
        let quizIndex = 0;
        let quizScore = 0;
        let quizQuestions = [];

        function resetQuiz() {
            quizIndex = 0;
            quizScore = 0;
            quizQuestions = [...defaultWords].sort(() => 0.5 - Math.random()).slice(0, 5);
            loadQuizQuestion();
        }

        function loadQuizQuestion() {
            if (quizIndex >= quizQuestions.length) {
                document.getElementById('quiz-question').innerText = "🎉 Дууслаа!";
                document.getElementById('quiz-reading').innerText = `Та 5 асуултаас ${quizScore} оноо авлаа.`;
                document.getElementById('quiz-options').innerHTML = '';
                document.getElementById('quiz-progress').innerText = "Квиз дууссан";
                return;
            }

            const current = quizQuestions[quizIndex];
            document.getElementById('quiz-progress').innerText = `Асуулт ${quizIndex + 1} / ${quizQuestions.length}`;
            document.getElementById('quiz-question').innerText = current.kanji;
            document.getElementById('quiz-reading').innerText = current.kana;
            document.getElementById('quiz-score').innerText = `Оноо: ${quizScore}`;

            let options = [current.translation];
            let remainingTranslations = defaultWords
                .map(w => w.translation)
                .filter(t => t !== current.translation);
            
            remainingTranslations.sort(() => 0.5 - Math.random());
            for (let i = 0; i < 3 && i < remainingTranslations.length; i++) {
                options.push(remainingTranslations[i]);
            }

            options.sort(() => 0.5 - Math.random());

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "py-3 px-5 rounded-xl border border-[#333333] bg-[#222222] hover:bg-[#2c2c2c] text-left transition text-base md:text-lg w-full flex justify-between items-center";
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => checkQuizAnswer(opt, current.translation, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkQuizAnswer(selected, correct, button) {
            const buttons = document.getElementById('quiz-options').querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);

            if (selected === correct) {
                quizScore++;
                button.classList.add('bg-green-900', 'border-green-500', 'text-green-200');
                button.innerHTML += ' <i class="fa-solid fa-check"></i>';
            } else {
                button.classList.add('bg-red-900', 'border-red-500', 'text-red-200');
                button.innerHTML += ' <i class="fa-solid fa-xmark"></i>';
                
                buttons.forEach(btn => {
                    if (btn.querySelector('span').innerText === correct) {
                        btn.classList.add('bg-green-950', 'border-green-700', 'text-green-300');
                        btn.innerHTML += ' <i class="fa-solid fa-check"></i>';
                    }
                });
            }

            document.getElementById('quiz-score').innerText = `Оноо: ${quizScore}`;

            setTimeout(() => {
                quizIndex++;
                loadQuizQuestion();
            }, 1200);
        }
    </script>
</body>
</html>
